<svg width="108" height="108" viewBox="0 0 108 108" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
    <!-- 完美复刻原图的底部渐变色 -->
    <linearGradient id="bg" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FFD1DF"/>
        <stop offset="50%" stop-color="#FFB3C6"/>
        <stop offset="100%" stop-color="#DABDF8"/>
    </linearGradient>
    
    <!-- 毛玻璃卡片的内渐变 -->
    <linearGradient id="glass" x1="18" y1="18" x2="90" y2="90" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15"/>
    </linearGradient>

    <!-- 柔和的阴影投影 -->
    <filter id="shadow" x="10" y="10" width="88" height="88" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
        <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#B07088" flood-opacity="0.25"/>
    </filter>
</defs>

<!-- 背景层 -->
<rect width="108" height="108" fill="url(#bg)"/>

<!-- 圆角毛玻璃卡片带粗白边 -->
<rect x="22" y="24" width="64" height="60" rx="20" fill="url(#glass)" stroke="#FFFFFF" stroke-width="2.5" filter="url(#shadow)"/>

<!-- 胖胖的可爱爱心，带白边 -->
<path d="M54 76 C 34 54, 24 44, 28 32 C 32 20, 52 20, 54 36 C 56 20, 76 20, 80 32 C 84 44, 74 54, 54 76 Z" 
      fill="#FFA3C0" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round"/>

<!-- 右上方大闪耀星芒 -->
<path d="M72 32 Q 74 40, 82 42 Q 74 44, 72 52 Q 70 44, 62 42 Q 70 40, 72 32 Z" fill="#FFFFFF"/>

<!-- 左下方小闪耀星芒 -->
<path d="M34 62 Q 35 68, 40 69 Q 35 70, 34 76 Q 33 70, 28 69 Q 33 68, 34 62 Z" fill="#FFFFFF"/>

<!-- 边缘的小圆点装饰 -->
<circle cx="26" cy="30" r="2.5" fill="#FFFFFF"/>
<circle cx="80" cy="74" r="2.5" fill="#FFFFFF"/>

</svg>
